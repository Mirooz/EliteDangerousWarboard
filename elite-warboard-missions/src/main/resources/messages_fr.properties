nav.route.stratum.info=Aucun First Footfall n'est enregistré sur ces mondes.\n\
Conditions idéales pour des découvertes d'Exobiology.\n\
Probabilité élevée de Stratum Tectonicas (~95 M CR).\n\
Quitter la bulle humaine renforce la fiabilité des données.\n\
Cliquez sur « Charger nouvelle route » pour tracer une nouvelle route.
nav.route.expressway.info=Route pour les exobiologies déjà découvertes qui valent cher.\n\
Aucune First Discover mais garantit à 100% la présence d'une exobiologie de grande valeur.\n\
Idéal pour maximiser les profits sans avoir besoin de découvrir de nouvelles espèces.\n\
Vous pouvez indiquer un système de destination (optionnel) ainsi que le nombre maximum de systèmes.\n\
Cliquez sur « Charger nouvelle route » pour tracer une nouvelle route.
nav.route.road_to_riches.info=Route optimisée pour scanner uniquement les planètes de grande valeur avec le DSS.\n\
Aucune exobiologie nécessaire, uniquement le scan de surface des planètes.\n\
Parfait pour maximiser les profits rapidement sans exploration approfondie.\n\
Vous pouvez indiquer un système de destination (optionnel) ainsi que le nombre maximum de systèmes.\n\
Cliquez sur « Charger nouvelle route » pour tracer une nouvelle route.
