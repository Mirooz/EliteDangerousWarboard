header.massacre.stack.help.title=Massacre mission stacks
header.massacre.stack.help.body=You can accept several massacre (pirate hunt) missions that all require kills in the same place against the same pirate minor faction.\n\n• Source systems — stations or settlements where factions post missions on the mission board; that is where you pick up each contract.\n• Target systems — the system named in each mission (often a resource extraction or combat zone); pirates spawned there belong to the target faction you must destroy.\n\nMissions can be issued by different factions on different boards, but if they all point at the same target faction in the same combat space, one qualifying kill usually adds +1 to the kill counter on every stacked mission for that faction. You turn in separately and earn the reward from each mission when it completes.
