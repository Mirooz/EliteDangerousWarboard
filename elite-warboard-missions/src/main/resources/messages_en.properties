exploration.system_bodies.helpTooltip=This panel lists bodies in the current system with exploration hints.\n\n• List: click a body to focus the map or open JSON details. Connector lines show moon/planet hierarchy.\n\n• “High value” filter: when on, only bodies with possible exobiology (from enriched data) or notable scan value (terraformable or high base scan value) remain.\n\n• Map badges: the biology icon marks bodies where life is expected or confirmed; X/Y is collected vs detected species (red / orange / green). The mapper icon is for DSS credit targets only (terraformable or high scan value): green check = mapped, red X = not yet. “FIRST” reflects first-discovery style flags from your journal when available.\n\n• Percentages: when a detailed scan includes predicted species odds, they are model estimates—not a guarantee in-game.\n\n• Overlay / lock: opens the bodies overlay map; the lock toggles whether mouse passes through to windows behind.\n\nData comes from your journals and optional Spansh enrichment; verify rare finds in Elite Dangerous.
