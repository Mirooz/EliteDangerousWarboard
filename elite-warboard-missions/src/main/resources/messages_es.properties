nav.route.stratum.info=Los datos de exploración sugieren que no se ha registrado ningún First Footfall en estos planetas.\n\
Son fuertes candidatos para descubrimientos de Exobiología.\n\
Alta probabilidad de Stratum Tectonicas (~95M CR).\n\
Alejarse de la burbuja humana aumenta la fiabilidad de los datos.\n\
Pulse el botón "Cargar nueva ruta" para buscar una nueva ruta.
nav.route.expressway.info=Ruta para exobiologías ya descubiertas que son valiosas.\n\
Sin First Discover pero garantiza al 100% la presencia de exobiología de gran valor.\n\
Ideal para maximizar beneficios sin necesidad de descubrir nuevas especies.\n\
Puede indicar un sistema de destino (opcional) y el número máximo de sistemas.\n\
Pulse el botón "Cargar nueva ruta" para buscar una nueva ruta.
nav.route.road_to_riches.info=Ruta optimizada para escanear solo planetas de gran valor con DSS.\n\
No se requiere exobiología, solo escaneo de superficie de planetas.\n\
Perfecto para maximizar beneficios rápidamente sin exploración profunda.\n\
Puede indicar un sistema de destino (opcional) y el número máximo de sistemas.\n\
Pulse el botón "Cargar nueva ruta" para buscar una nueva ruta.
