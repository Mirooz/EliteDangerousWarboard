colonisation.fleet.optimalMarket.helpTooltip=Trova le stazioni più vicine che hanno in stock il maggior numero possibile di merci richieste, in modo da effettuare meno tappe.\n\nEvita atterraggio planetario: preferisce le stazioni dove non è necessario atterrare sulla superficie di un pianeta. Se una merce è disponibile solo su un mercato planetario/di superficie, quella stazione può comunque comparire — ad esempio CMM Composite.\n\nNella tabella del cargo del carrier a sinistra, ogni riga di merce utilizza lo stesso colore della stazione a cui è associata nei risultati (un colore per tappa).
