header.massacre.stack.help.title=Impilare missioni massacro
header.massacre.stack.help.body=Puoi accettare diverse missioni massacro (caccia ai pirati) che richiedono eliminazioni nello stesso luogo contro la stessa minor faction pirata.\n\n• Sistemi sorgente — stazioni o insediamenti dove le fazioni pubblicano missioni al pannello missioni; è lì che ritiri ogni contratto.\n• Sistemi bersaglio — il sistema indicato nella missione (spesso estrazione risorse o zona di combattimento); i pirati che compaiono lì appartengono alla fazione bersaglio da distruggere.\n\nLe missioni possono essere offerte da fazioni diverse su bacheche diverse; se puntano tutte alla stessa fazione pirata nello stesso spazio di combattimento, un abbattimento valido di solito aggiunge +1 al contatore di ogni missione impilata coinvolta. Consegni ogni missione separatamente e incassi la ricompensa di ciascuna al completamento.
