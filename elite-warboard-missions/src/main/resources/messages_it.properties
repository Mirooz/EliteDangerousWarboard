nav.route.stratum.info=I dati di esplorazione suggeriscono che nessun First Footfall è stato registrato su questi pianeti.\n\
Sono forti candidati per scoperte di Esobiologia.\n\
Alta probabilità di Stratum Tectonicas (~95M CR).\n\
Allontanarsi dalla bolla umana aumenta l'affidabilità dei dati.\n\
Premi il pulsante "Carica nuova rotta" per cercare una nuova rotta.
nav.route.expressway.info=Rotta per esobiologie già scoperte e di valore.\n\
Nessuna First Discover ma garantisce al 100% la presenza di esobiologia di alto valore.\n\
Ideale per massimizzare i profitti senza dover scoprire nuove specie.\n\
È possibile indicare un sistema di destinazione (opzionale) e il numero massimo di sistemi.\n\
Premi il pulsante "Carica nuova rotta" per cercare una nuova rotta.
nav.route.road_to_riches.info=Rotta ottimizzata per scansionare solo pianeti di alto valore con DSS.\n\
Non è richiesta esobiologia, solo scansione di superficie dei pianeti.\n\
Perfetto per massimizzare rapidamente i profitti senza esplorazione approfondita.\n\
È possibile indicare un sistema di destinazione (opzionale) e il numero massimo di sistemi.\n\
Premi il pulsante "Carica nuova rotta" per cercare una nuova rotta.
