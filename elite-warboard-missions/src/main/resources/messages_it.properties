exploration.system_bodies.helpTooltip=Elenco dei corpi del sistema attuale con suggerimenti di esplorazione.\n\n• Lista: clic per centrare la mappa o aprire il JSON. Linee = gerarchia lune / pianeti.\n\n• Filtro « alto valore »: nasconde corpi senza probabile exobiologia (dati arricchiti) né valore di scansione rilevante (terraformabile o base scan alta).\n\n• Badge mappa: icona bio = vita attesa o confermata; X/Y = specie raccolte / rilevate (rosso / arancio / verde). Icona carto = solo DSS per crediti (terraformabile o alto valore): ✓ mappato, ✗ non ancora. « FIRST » = indizio prima scoperta dal diario se disponibile.\n\n• Percentuali: con scansione dettagliata e probabilità di specie, sono stime del modello, non garanzia in gioco.\n\n• Overlay / lucchetto: mappa corpi in sovrapposizione; il lucchetto regola il passaggio del mouse alle finestre sotto.\n\nDati da diario e Spansh opzionale; verificare in gioco i ritrovamenti rari.
