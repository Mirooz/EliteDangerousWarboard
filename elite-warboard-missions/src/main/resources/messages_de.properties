exploration.system_bodies.helpTooltip=Liste der Himmelskörper im aktuellen System mit Erkundungshinweisen.\n\n• Liste: Klick fokussiert die Karte oder öffnet JSON-Details. Linien zeigen Mond/Planet-Hierarchie.\n\n• „Hoher Wert“-Filter: blendet Körper ohne wahrscheinliche Exobiologie (angereicherte Daten) oder nennenswerten Scanwert (terraformierbar oder hoher Basis-Scanwert) aus.\n\n• Karten-Badges: Bio-Symbol = erwartetes oder bestätigtes Leben; X/Y = gesammelte vs. erkannte Arten (rot / orange / grün). Karto-Symbol nur für DSS-Kredit-Ziele (terraformierbar oder hoher Wert): grünes Häkchen = kartiert, rotes X = noch nicht. „FIRST“ = Erstentdeckung laut Journal, falls vorhanden.\n\n• Prozentwerte bei detailliertem Scan: Modellschätzungen, kein Ingame-Garant.\n\n• Overlay / Schloss: Körper-Overlay-Karte; Schloss steuert Durchklicken zu Fenstern dahinter.\n\nDaten aus Journal und optional Spansh; seltene Funde im Spiel prüfen.
