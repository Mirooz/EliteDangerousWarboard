header.massacre.stack.help.body=Sie können mehrere Massaker-Missionen (Piratenjagd) annehmen, die alle am selben Ort gegen dieselbe Piraten-Minor-Faction Tötungen verlangen.\n\n• Quellsysteme — Stationen oder Siedlungen, an deren Missionsbrett Fraktionen Aufträge anbieten; dort nehmen Sie jeden Vertrag an.\n• Zielsysteme — das in der Mission genannte System (oft Ressourcenabbau- oder Kampfzone); dort erscheinende Piraten gehören zur Ziel-Faction, die Sie vernichten müssen.\n\nMissionen können von verschiedenen Fraktionen an verschiedenen Brettern ausgegeben werden; zeigen sie alle auf dieselbe Piraten-Faction im selben Kampfraum, zählt ein gültiger Abschuss in der Regel +1 auf den Kill-Zähler jeder gestapelten betroffenen Mission. Sie geben jede Mission einzeln ab und erhalten die Belohnung jeder Mission bei Abschluss.
