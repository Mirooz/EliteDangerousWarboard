colonisation.fleet.optimalMarket.helpTooltip=Findet die nächstgelegenen Stationen, die möglichst viele Ihrer angeforderten Waren führen, sodass Sie weniger Stopps benötigen.\n\nPlanetare Landung vermeiden: bevorzugt Stationen, an denen Sie nicht auf einer Planetenoberfläche landen müssen. Wenn eine Ware nur auf einem planetaren/Oberflächenmarkt verfügbar ist, kann diese Station dennoch erscheinen — z. B. CMM Composite.\n\nIn der Carrier-Frachttabelle links verwendet jede Warenzeile dieselbe Farbe wie die Station, der sie in den Ergebnissen zugeordnet ist (eine Farbe pro Stopp).
