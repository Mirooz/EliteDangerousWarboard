nav.route.stratum.info=Erkundungsdaten deuten darauf hin, dass auf diesen Planeten kein First Footfall registriert wurde.\n\
Sie sind starke Kandidaten für Exobiologie-Entdeckungen.\n\
Hohe Wahrscheinlichkeit von Stratum Tectonicas (~95M CR).\n\
Je weiter man sich von der Menschen-Bubble entfernt, desto zuverlässiger sind die Daten.\n\
Klicken Sie auf "Neue Route laden", um eine neue Route zu suchen.
nav.route.expressway.info=Route für bereits entdeckte, wertvolle Exobiologien.\n\
Kein First Discover, garantiert aber 100% das Vorhandensein hochwertiger Exobiologie.\n\
Ideal, um Gewinne zu maximieren, ohne neue Arten entdecken zu müssen.\n\
Sie können ein Zielsystem (optional) und die maximale Anzahl von Systemen angeben.\n\
Klicken Sie auf "Neue Route laden", um eine neue Route zu suchen.
nav.route.road_to_riches.info=Optimierte Route, um nur hochwertige Planeten mit DSS zu scannen.\n\
Keine Exobiologie nötig, nur Oberflächenscans der Planeten.\n\
Perfekt, um schnell hohe Gewinne zu erzielen, ohne tiefgehende Erkundung.\n\
Sie können ein Zielsystem (optional) und die maximale Anzahl von Systemen angeben.\n\
Klicken Sie auf "Neue Route laden", um eine neue Route zu suchen.
