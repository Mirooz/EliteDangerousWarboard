---
openapi: 3.0.3
info:
  title: analytics-backend-api API
  version: 1.3.4-SNAPSHOT
paths:
  /api/analytics/client-error-report:
    post:
      tags:
      - Analytics Controller
      parameters:
      - name: X-App-Version
        in: header
        schema:
          type: string
      - name: X-Commander-Name
        in: header
        schema:
          type: string
      - name: X-Fid
        in: header
        schema:
          type: string
      - name: X-Os
        in: header
        schema:
          type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                logFile:
                  format: binary
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientErrorReportDto'
  /api/analytics/health:
    get:
      tags:
      - Analytics Controller
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsHealthResponse'
  /api/analytics/internal/client-error-reports:
    get:
      tags:
      - Client Error Report Admin Resource
      parameters:
      - name: limit
        in: query
        schema:
          format: int32
          type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClientErrorReportListItemDto'
  /api/analytics/internal/client-error-reports/{id}/log:
    get:
      tags:
      - Client Error Report Admin Resource
      parameters:
      - name: id
        in: path
        required: true
        schema:
          format: int64
          type: integer
      responses:
        "200":
          description: OK
  /api/analytics/sessions/start:
    post:
      tags:
      - Analytics Controller
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartSessionRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StartSessionResponse'
  /api/analytics/sessions/{sessionId}/end:
    post:
      tags:
      - Analytics Controller
      parameters:
      - name: sessionId
        in: path
        required: true
        schema:
          format: int64
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EndSessionRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EndSessionResponse'
  /api/analytics/version/latest:
    get:
      tags:
      - Analytics Controller
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LatestVersionResponse'
  /api/ardent/commodities/maxsell:
    post:
      tags:
      - Ardent Api Controller
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommodityMarketQueryRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaxSellResponseDTO'
      deprecated: true
  /api/ardent/commodities/nearby/buy:
    post:
      tags:
      - Ardent Api Controller
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NearbyExportsCrosscheckRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NearbyExportsCrosscheckResponse'
  /api/capi/callback:
    get:
      tags:
      - Capi Controller
      summary: Callback OAuth Frontier (HTML)
      parameters:
      - name: code
        in: query
        schema:
          type: string
      - name: state
        in: query
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            text/html:
              schema:
                type: string
  /api/capi/fleetcarrier:
    post:
      tags:
      - Capi Controller
      summary: Proxy CAPI données fleet carrier
      description: "Réponses JSON : DTO CapiFleetCarrierDto (200, 401 ou 502)."
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CapiFleetCarrierProxyRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapiFleetCarrierDto'
  /api/capi/fleetcarrier/market:
    post:
      tags:
      - Capi Controller
      summary: Met en file une publication market fleet carrier différée
      description: "Réponses JSON : DTO CapiFleetCarrierMarketQueuedDto (202 ou 400)."
      parameters:
      - name: delay
        in: query
        schema:
          format: int32
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CapiFleetCarrierProxyRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapiFleetCarrierMarketQueuedDto'
  /api/capi/login:
    get:
      tags:
      - Capi Controller
      summary: URL de login Frontier pour un fid
      description: "Réponses JSON : DTO CapiLoginDto (200 ou 400)."
      parameters:
      - name: fid
        in: query
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapiLoginDto'
  /api/capi/logout:
    post:
      tags:
      - Capi Controller
      summary: Déconnexion CAPI pour un fid
      description: "Supprime access_token et refresh_token en base (table capi_commander_auth).\
        \ Réponses JSON : DTO CapiLogoutDto (200 ou 400). Idempotent si aucune session."
      parameters:
      - name: fid
        in: query
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapiLogoutDto'
  /api/capi/market:
    post:
      tags:
      - Capi Controller
      summary: Proxy CAPI marché + publication EDDN
      description: "Réponses JSON : DTO CapiMarketDto (200, 401, 409 ou 502 selon\
        \ le cas)."
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CapiMarketProxyRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapiMarketDto'
  /api/capi/profile:
    get:
      tags:
      - Capi Controller
      summary: Vérifie token CAPI et récupère le profil Frontier
      description: "Réponses JSON : DTO CapiProfileDto (200, 400, 401 ou 502)."
      parameters:
      - name: commanderName
        in: query
        schema:
          type: string
      - name: fid
        in: query
        schema:
          type: string
      - name: language
        in: query
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapiProfileDto'
  /api/capi/wait-approval:
    get:
      tags:
      - Capi Controller
      summary: Long polling d'approbation OAuth Frontier pour un fid
      description: "Bloque jusqu'a 60s en attendant la reception du callback OAuth\
        \ pour ce fid. Reponse 200 avec { approved: true, fid } si approuve (y compris\
        \ si le callback est arrive jusqu'a 30s avant la requete), 200 avec { approved:\
        \ false, timeout: true } sinon. Une nouvelle requete pour un fid deja en attente\
        \ libere la precedente en timeout."
      parameters:
      - name: fid
        in: query
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json: {}
