components:
  schemas:
    AnalyticErrorBody:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: {}
    AnalyticsHealthResponse:
      type: object
      properties:
        status:
          type: string
        service:
          type: string
    ArdentCommodityNearbyExport:
      type: object
      properties:
        commodityName:
          type: string
        marketId:
          format: int64
          type: integer
        stationName:
          type: string
        stationType:
          type: string
        distanceToArrival:
          format: double
          type: number
        maxLandingPadSize:
          format: int32
          type: integer
        bodyId:
          format: int64
          type: integer
        bodyName:
          type: string
        systemAddress:
          format: int64
          type: integer
        systemName:
          type: string
        systemX:
          format: double
          type: number
        systemY:
          format: double
          type: number
        systemZ:
          format: double
          type: number
        buyPrice:
          format: int32
          type: integer
        demand:
          format: int32
          type: integer
        demandBracket:
          type: string
        meanPrice:
          format: int32
          type: integer
        sellPrice:
          format: int32
          type: integer
        stock:
          format: int32
          type: integer
        stockBracket:
          type: string
        updatedAt:
          $ref: '#/components/schemas/Instant'
        distance:
          format: int32
          type: integer
    AtmosphereComposition:
      type: object
      properties:
        name:
          type: string
        share:
          format: double
          type: number
    Belt:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
        mass:
          format: double
          type: number
        inner_radius:
          format: double
          type: number
        outer_radius:
          format: double
          type: number
    BodyResult:
      type: object
      properties:
        age:
          format: double
          type: number
        arg_of_periapsis:
          format: double
          type: number
        atmosphere:
          type: string
        atmosphere_composition:
          type: array
          items:
            $ref: '#/components/schemas/AtmosphereComposition'
        axis_tilt:
          format: double
          type: number
        belts:
          type: array
          items:
            $ref: '#/components/schemas/Belt'
        body_id:
          format: int32
          type: integer
        distance:
          format: double
          type: number
        distance_to_arrival:
          format: double
          type: number
        earth_masses:
          format: double
          type: number
        estimated_mapping_value:
          format: int32
          type: integer
        estimated_scan_value:
          format: int32
          type: integer
        gravity:
          format: double
          type: number
        genuses:
          type: array
          items:
            $ref: '#/components/schemas/Genus'
        id:
          type: string
        id64:
          format: int64
          type: integer
        is_landable:
          type: boolean
        is_main_star:
          type: boolean
        is_rotational_period_tidally_locked:
          type: boolean
        landmark_value:
          format: int32
          type: integer
        landmarks:
          type: array
          items:
            $ref: '#/components/schemas/Landmark'
        luminosity_class:
          type: string
        materials:
