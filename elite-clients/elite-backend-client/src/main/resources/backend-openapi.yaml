---
openapi: 3.0.3
info:
  title: analytics-backend-api API
  version: 1.3.4-SNAPSHOT
paths:
  /api/analytics/health:
    get:
      tags:
      - Analytics Controller
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsHealthResponse'
  /api/analytics/sessions/start:
    post:
      tags:
      - Analytics Controller
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartSessionRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StartSessionResponse'
  /api/analytics/sessions/{sessionId}/end:
    post:
      tags:
      - Analytics Controller
      parameters:
      - name: sessionId
        in: path
        required: true
        schema:
          format: int64
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EndSessionRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EndSessionResponse'
  /api/analytics/version/latest:
    get:
      tags:
      - Analytics Controller
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LatestVersionResponse'
  /api/ardent/commodities/maxsell:
    post:
      tags:
      - Ardent Api Controller
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommodityMarketQueryRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaxSellResponseDTO'
      deprecated: true
  /api/ardent/commodities/nearby/buy:
    post:
      tags:
      - Ardent Api Controller
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NearbyExportsCrosscheckRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NearbyExportsCrosscheckResponse'
  /api/capi/callback:
    get:
      tags:
      - Capi Controller
      summary: Callback OAuth Frontier (HTML)
      parameters:
      - name: code
        in: query
        schema:
          type: string
      - name: state
        in: query
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            text/html:
              schema:
                type: string
  /api/capi/fleetcarrier:
    post:
      tags:
      - Capi Controller
      summary: Proxy CAPI données fleet carrier
      description: "Réponses JSON : enveloppe CapiApiResponse (200, 401 ou 502)."
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CapiFleetCarrierProxyRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapiApiResponse'
  /api/capi/fleetcarrier/market:
    post:
      tags:
      - Capi Controller
      summary: Met en file une publication market fleet carrier différée
      description: "Réponses JSON : enveloppe CapiApiResponse (202 ou 400)."
      parameters:
      - name: delay
        in: query
        schema:
          format: int32
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CapiFleetCarrierProxyRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapiApiResponse'
  /api/capi/login:
    get:
      tags:
      - Capi Controller
      summary: URL de login Frontier pour un fid
      description: "Réponses JSON : enveloppe CapiApiResponse (200 ou 400)."
      parameters:
      - name: fid
        in: query
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapiApiResponse'
  /api/capi/market:
    post:
      tags:
      - Capi Controller
      summary: Proxy CAPI marché + publication EDDN
      description: "Réponses JSON : enveloppe CapiApiResponse (200, 401, 409 ou 502\
        \ selon le cas)."
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CapiMarketProxyRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapiApiResponse'
  /api/capi/profile:
    get:
      tags:
      - Capi Controller
      summary: Vérifie token CAPI et récupère le profil Frontier
      description: "Réponses JSON : enveloppe CapiApiResponse (200, 400, 401 ou 502)."
      parameters:
      - name: commanderName
        in: query
        schema:
          type: string
      - name: fid
        in: query
        schema:
          type: string
      - name: language
        in: query
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapiApiResponse'
  /api/spansh/expressway-to-exomastery:
    post:
      tags:
      - Spansh Controller
      summary: Route Expressway to Exomastery (déprécié)
      description: Utiliser POST /api/spansh/routes/exobiology à la place.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpanshRouteRequestDTO'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpanshRouteResponseDTO'
      deprecated: true
  /api/spansh/road-to-riches:
    post:
      tags:
      - Spansh Controller
      summary: Route Road to Riches (déprécié)
      description: Utiliser POST /api/spansh/routes/riches à la place.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpanshRouteRequestDTO'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpanshRouteResponseDTO'
      deprecated: true
  /api/spansh/route/{guid}:
    get:
      tags:
      - Spansh Controller
      summary: Résultats de route Spansh par GUID (déprécié)
      description: "Utiliser GET /api/spansh/routes/{guid} à la place."
      parameters:
      - name: guid
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpanshRouteResponseDTO'
      deprecated: true
  /api/spansh/routes/exobiology:
    post:
      tags:
      - Spansh Controller
      summary: Route Expressway to Exomastery (exobiologie)
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpanshRouteRequestDTO'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpanshRouteResponseDTO'
  /api/spansh/routes/riches:
    post:
      tags:
      - Spansh Controller
      summary: Route Road to Riches
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpanshRouteRequestDTO'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpanshRouteResponseDTO'
  /api/spansh/routes/{guid}:
    get:
      tags:
      - Spansh Controller
      summary: Résultats de route Spansh par GUID
      parameters:
      - name: guid
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpanshRouteResponseDTO'
  /api/spansh/search/{guid}:
    get:
      tags:
      - Spansh Controller
      summary: Résultats de recherche Spansh par GUID (déprécié)
      description: "Utiliser GET /api/spansh/searches/{guid} à la place."
      parameters:
      - name: guid
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpanshSearchResponseDTO'
      deprecated: true
  /api/spansh/searches/stratum:
    post:
      tags:
      - Spansh Controller
      summary: Recherche Stratum Undiscovered
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpanshSearchRequestDTO'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpanshSearchResponseDTO'
  /api/spansh/searches/{guid}:
    get:
      tags:
      - Spansh Controller
      summary: Résultats de recherche Spansh par GUID
      parameters:
      - name: guid
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpanshSearchResponseDTO'
  /api/spansh/stratum-undiscovered:
    post:
      tags:
      - Spansh Controller
      summary: Recherche Stratum Undiscovered (déprécié)
      description: Utiliser POST /api/spansh/searches/stratum à la place.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpanshSearchRequestDTO'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpanshSearchResponseDTO'
      deprecated: true
components:
  schemas:
    AnalyticsHealthResponse:
      type: object
      properties:
        status:
          type: string
        service:
          type: string
    ArdentCommodityNearbyExport:
      type: object
      properties:
        commodityName:
          type: string
        marketId:
          format: int64
          type: integer
        stationName:
          type: string
        stationType:
          type: string
        distanceToArrival:
          format: double
          type: number
        maxLandingPadSize:
          format: int32
          type: integer
        bodyId:
          format: int64
          type: integer
        bodyName:
          type: string
        systemAddress:
          format: int64
          type: integer
        systemName:
          type: string
        systemX:
          format: double
          type: number
        systemY:
          format: double
          type: number
        systemZ:
          format: double
          type: number
        buyPrice:
          format: int32
          type: integer
        demand:
          format: int32
          type: integer
        demandBracket:
          type: string
        meanPrice:
          format: int32
          type: integer
        sellPrice:
          format: int32
          type: integer
        stock:
          format: int32
          type: integer
        stockBracket:
          type: string
        updatedAt:
          $ref: '#/components/schemas/Instant'
        distance:
          format: int32
          type: integer
    AtmosphereComposition:
      type: object
      properties:
        name:
          type: string
        share:
          format: double
          type: number
    BodyResult:
      type: object
      properties:
        arg_of_periapsis:
          format: double
          type: number
        atmosphere:
          type: string
        atmosphere_composition:
          type: array
          items:
            $ref: '#/components/schemas/AtmosphereComposition'
        axis_tilt:
          format: double
          type: number
        body_id:
          format: int32
          type: integer
        distance:
          format: double
          type: number
        distance_to_arrival:
          format: double
          type: number
        earth_masses:
          format: double
          type: number
        estimated_mapping_value:
          format: int32
          type: integer
        estimated_scan_value:
          format: int32
          type: integer
        gravity:
          format: double
          type: number
        id:
          type: string
        id64:
          format: int64
          type: integer
        is_landable:
          type: boolean
        is_main_star:
          type: boolean
        is_rotational_period_tidally_locked:
          type: boolean
        name:
          type: string
        orbital_eccentricity:
          format: double
          type: number
        orbital_inclination:
          format: double
          type: number
        orbital_period:
          format: double
          type: number
        orbital_synchronicity:
          format: double
          type: number
        parents:
          type: array
          items:
            $ref: '#/components/schemas/Parent'
        radius:
          format: double
          type: number
        rotational_period:
          format: double
          type: number
        semi_major_axis:
          format: double
          type: number
        solid_composition:
          type: array
          items:
            $ref: '#/components/schemas/SolidComposition'
        subtype:
          type: string
        surface_pressure:
          format: double
          type: number
        surface_temperature:
          format: double
          type: number
        system_id64:
          format: int64
          type: integer
        system_name:
          type: string
        system_region:
          type: string
        system_x:
          format: double
          type: number
        system_y:
          format: double
          type: number
        system_z:
          format: double
          type: number
        terraforming_state:
          type: string
        type:
          type: string
        updated_at:
          $ref: '#/components/schemas/OffsetDateTime'
        volcanism_type:
          type: string
    BodyResult1:
      type: object
      properties:
        distance_to_arrival:
          format: double
          type: number
        estimated_mapping_value:
          format: int32
          type: integer
        estimated_scan_value:
          format: int32
          type: integer
        id:
          format: int64
          type: integer
        id64:
          format: int64
          type: integer
        is_terraformable:
          type: boolean
        landmark_value:
          format: int32
          type: integer
        landmarks:
          type: array
          items:
            $ref: '#/components/schemas/Landmark'
        name:
          type: string
        subtype:
          type: string
        type:
          type: string
    CapiApiErrorBody:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: {}
    CapiApiResponse:
      type: object
      properties:
        status:
          type: string
        data: {}
        error:
          $ref: '#/components/schemas/CapiApiErrorBody'
    CapiFleetCarrierProxyRequest:
      required:
      - fid
      - commanderName
      type: object
      properties:
        fid:
          pattern: \S
          type: string
        commanderName:
          pattern: \S
          type: string
        language:
          type: string
    CapiMarketEvent:
      required:
      - event
      - MarketID
      type: object
      properties:
        timestamp:
          type: string
        event:
          pattern: (?i)^Market$
          type: string
        MarketID:
          format: int64
          type: integer
        StationName:
          type: string
        StationType:
          type: string
        CarrierDockingAccess:
          type: string
        StarSystem:
          type: string
    CapiMarketProxyRequest:
      required:
      - fid
      - commanderName
      - event
      type: object
      properties:
        fid:
          pattern: \S
          type: string
        commanderName:
          pattern: \S
          type: string
        event:
          $ref: '#/components/schemas/CapiMarketEvent'
    CommodityMarketDao:
      type: object
      properties:
        commodityName:
          type: string
        stationName:
          type: string
        stationType:
          type: string
        sellPrice:
          format: int32
          type: integer
        demand:
          format: int32
          type: integer
        marketUpdatedAt:
          $ref: '#/components/schemas/Instant'
    CommodityMarketQueryRequest:
      type: object
      properties:
        commodityNames:
          type: array
          items:
            type: string
    EndSessionRequest:
      type: object
      properties:
        panelTimes:
          type: object
          additionalProperties:
            format: int64
            type: integer
    EndSessionResponse:
      type: object
      properties:
        sessionId:
          format: int64
          type: integer
        durationSeconds:
          format: int64
          type: integer
        message:
          type: string
    Instant:
      format: date-time
      type: string
      example: 2022-03-10T16:15:50Z
    Landmark:
      type: object
      properties:
        count:
          format: int32
          type: integer
        subtype:
          type: string
        type:
          type: string
        value:
          format: int32
          type: integer
    LatestVersionResponse:
      type: object
      properties:
        tagName:
          type: string
        name:
          type: string
        publishedAt:
          type: string
        htmlUrl:
          type: string
        body:
          type: string
    MatchedCommodityNearbyExport:
      type: object
      properties:
        requestedCommodityName:
          type: string
        export:
          $ref: '#/components/schemas/ArdentCommodityNearbyExport'
    MaxSellResponseDTO:
      type: object
      properties:
        snapshots:
          type: array
          items:
            $ref: '#/components/schemas/CommodityMarketDao'
    NearbyExportsBestStationResult:
      type: object
      properties:
        matchedCommodityCount:
          format: int32
          type: integer
        minDistanceLy:
          format: int32
          type: integer
        marketId:
          format: int64
          type: integer
        stationName:
          type: string
        stationType:
          type: string
        systemName:
          type: string
        systemAddress:
          format: int64
          type: integer
        matches:
          type: array
          items:
            $ref: '#/components/schemas/MatchedCommodityNearbyExport'
    NearbyExportsCrosscheckRequest:
      type: object
      properties:
        systemName:
          type: string
        commodityNames:
          type: array
          items:
            type: string
        avoidPlanetaryLanding:
          type: boolean
    NearbyExportsCrosscheckResponse:
      type: object
      properties:
        systemName:
          type: string
        commodityNames:
          type: array
          items:
            type: string
        bestStations:
          type: array
          items:
            $ref: '#/components/schemas/NearbyExportsBestStationResult'
        totalCommoditiesCovered:
          format: int32
          type: integer
        uncoveredCommodityNames:
          type: array
          items:
            type: string
    OffsetDateTime:
      format: date-time
      type: string
      example: 2022-03-10T12:15:50-04:00
    Parent:
      type: object
      properties:
        id64:
          format: int64
          type: integer
        subtype:
          type: string
        type:
          type: string
    Reference:
      type: object
      properties:
        id64:
          format: int64
          type: integer
        name:
          type: string
        x:
          format: double
          type: number
        "y":
          format: double
          type: number
        z:
          format: double
          type: number
    RouteParameters:
      type: object
      properties:
        avoid_thargoids:
          format: int32
          type: integer
        loop:
          type: string
        max_distance:
          type: string
        max_results:
          type: string
        min_value:
          type: string
        radius:
          type: string
        range:
          type: string
        source:
          type: string
        use_mapping_value:
          type: string
    SolidComposition:
      type: object
      properties:
        name:
          type: string
        share:
          format: double
          type: number
    SpanshComparisonFilter:
      type: object
      properties:
        comparison:
          type: string
        value:
          type: array
          items: {}
    SpanshFilter:
      type: object
      properties:
        value:
          type: array
          items:
            type: string
    SpanshRangeFilter:
      type: object
      properties:
        min:
          type: string
        max:
          type: string
    SpanshRouteRequestDTO:
      type: object
      properties:
        commandername:
          type: string
        maxJumpRange:
          format: double
          type: number
        systemName:
          type: string
        destinationSystem:
          type: string
        maxSystems:
          format: int32
          type: integer
    SpanshRouteResponseDTO:
      type: object
      properties:
        searchReference:
          type: string
        spanshResponse:
          $ref: '#/components/schemas/SpanshRouteResultsResponse'
        message:
          type: string
    SpanshRouteResultsResponse:
      type: object
      properties:
        job:
          type: string
        parameters:
          $ref: '#/components/schemas/RouteParameters'
        result:
          type: array
          items:
            $ref: '#/components/schemas/SystemResult'
        state:
          type: string
        status:
          type: string
    SpanshSearchFilters:
      type: object
      properties:
        atmosphere:
          $ref: '#/components/schemas/SpanshFilter'
        distance:
          $ref: '#/components/schemas/SpanshRangeFilter'
        distance_to_arrival:
          $ref: '#/components/schemas/SpanshComparisonFilter'
        gravity:
          $ref: '#/components/schemas/SpanshComparisonFilter'
        subtype:
          $ref: '#/components/schemas/SpanshFilter'
        updated_at:
          $ref: '#/components/schemas/SpanshComparisonFilter'
    SpanshSearchRequestDTO:
      type: object
      properties:
        commandername:
          type: string
        referenceSystem:
          type: string
    SpanshSearchResponse:
      type: object
      properties:
        count:
          format: int32
          type: integer
        from:
          format: int32
          type: integer
        reference:
          $ref: '#/components/schemas/Reference'
        results:
          type: array
          items:
            $ref: '#/components/schemas/BodyResult'
        search_reference:
          type: string
        search:
          $ref: '#/components/schemas/SpanshSearchSaveResponse'
    SpanshSearchResponseDTO:
      type: object
      properties:
        searchReference:
          type: string
        spanshResponse:
          $ref: '#/components/schemas/SpanshSearchResponse'
        message:
          type: string
    SpanshSearchSaveResponse:
      type: object
      properties:
        filters:
          $ref: '#/components/schemas/SpanshSearchFilters'
        page:
          format: int32
          type: integer
        reference_system:
          type: string
        reference_system_details:
          $ref: '#/components/schemas/Reference'
        size:
          format: int32
          type: integer
        sort:
          type: array
          items:
            $ref: '#/components/schemas/SpanshSort'
    SpanshSort:
      type: object
      properties:
        distance:
          $ref: '#/components/schemas/SpanshSortDirection'
    SpanshSortDirection:
      type: object
      properties:
        direction:
          type: string
    StartSessionRequest:
      type: object
      properties:
        commanderName:
          type: string
        appVersion:
          type: string
        operatingSystem:
          type: string
    StartSessionResponse:
      type: object
      properties:
        sessionId:
          format: int64
          type: integer
        message:
          type: string
    SystemResult:
      type: object
      properties:
        bodies:
          type: array
          items:
            $ref: '#/components/schemas/BodyResult1'
        id64:
          type: string
        jumps:
          format: int32
          type: integer
        name:
          type: string
        x:
          format: double
          type: number
        "y":
          format: double
          type: number
        z:
          format: double
          type: number
