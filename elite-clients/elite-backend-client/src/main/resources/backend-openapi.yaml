          type: string
        subtype:
          type: string
        type:
          type: string
    CapiApiErrorBody:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: {}
    CapiDockedEvent:
      required:
      - event
      - MarketID
      type: object
      properties:
        timestamp:
          type: string
        event:
