        in: query
        schema:
          type: string
      - name: systemId64
        in: query
        schema:
          format: int64
          type: integer
      - name: systemName
        in: query
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpanshSearchResponseDTO'
  /api/spansh/expressway-to-exomastery:
    post:
      tags:
      - Spansh Controller
      summary: Route Expressway to Exomastery (déprécié)
      description: Utiliser POST /api/spansh/routes/exobiology à la place.
      requestBody:
        content:
